                    <h2>Navigation Parameters</h2>
  <form id="paramForm">
    <!-- Parameters will be dynamically inserted here -->
  </form>

  <div class="container">
    <form id="paramForm">
        <div id="paramFields"></div>
        <button type="button" id="updateButton" class="btn btn-primary">Update Parameters</button>
        <button type="button" id="resetCurrent" class="btn btn-secondary">Reset to Current</button>
        <button type="button" id="resetDefaults" class="btn btn-warning">Reset to Defaults</button>
      </form>
    <div id="feedback" class="mt-3"></div>
  </div>
  
  <script>
  let defaultParams = {};
  let currentParams = {};
  
function fetchParams() {
    fetch('/api/navigation')
      .then(response => response.json())
      .then(data => {
        currentParams = data;
        defaultParams = JSON.parse(JSON.stringify(data)); // Deep copy for defaults
        displayParams();
      })
      .catch(error => {
        console.error('Error fetching parameters:', error);
        showFeedback('Error fetching parameters. Please try again.', 'danger');
      });
  }
  
function displayParams() {
  const paramFields = document.getElementById('paramFields');
  paramFields.innerHTML = ''; // Clear existing fields

function createNestedFields(obj, prefix = '', level = 0) {
    const container = document.createElement('div');
    container.className = `param-group level-${level}`;
    container.style.marginLeft = `${level * 20}px`; // Indent based on nesting level

    Object.entries(obj).forEach(([key, value]) => {
      const fullKey = prefix ? `${prefix}.${key}` : key;
      
      if (typeof value === 'object' && value !== null) {
        // Create a collapsible section for nested objects
        const fieldset = document.createElement('fieldset');
        fieldset.className = 'border p-2 mb-3';
        
        const legend = document.createElement('legend');
        legend.className = 'w-auto';
        legend.innerHTML = `<span class="toggle-icon">▼</span> ${key}`;
        legend.style.cursor = 'pointer';
        
        const childContainer = createNestedFields(value, fullKey, level + 1);
        childContainer.style.display = 'none'; // Initially collapsed
        
        legend.addEventListener('click', () => {
          childContainer.style.display = childContainer.style.display === 'none' ? 'block' : 'none';
          legend.querySelector('.toggle-icon').textContent = childContainer.style.display === 'none' ? '▼' : '▲';
        });
        
        fieldset.appendChild(legend);
        fieldset.appendChild(childContainer);
        container.appendChild(fieldset);
      } else {
        // Create input for non-object values
        container.appendChild(createParamInput(fullKey, value));
      }
    });

    return container;
  }

  paramFields.appendChild(createNestedFields(currentParams));
}  
function createParamInput(key, value) {
  const formGroup = document.createElement('div');
  formGroup.className = 'form-group mb-2';
  
  const label = document.createElement('label');
  label.textContent = key.split('.').pop(); // Only show the last part of the key
  label.setAttribute('for', key);
  label.className = 'form-label';
  
  let input;
  
  if (typeof value === 'boolean') {
    input = document.createElement('select');
    input.className = 'form-select form-select-sm';
    
    const trueOption = document.createElement('option');
    trueOption.value = 'true';
    trueOption.textContent = 'True';
    trueOption.selected = value === true;
    
    const falseOption = document.createElement('option');
    falseOption.value = 'false';
    falseOption.textContent = 'False';
    falseOption.selected = value === false;
    
    input.appendChild(trueOption);
    input.appendChild(falseOption);
  } else {
    input = document.createElement('input');
    input.className = 'form-control form-control-sm';
    input.setAttribute('type', typeof value === 'number' ? 'number' : 'text');
    input.setAttribute('value', value);
  }
  
  input.setAttribute('id', key);
  input.setAttribute('name', key);
  
  const defaultValue = getNestedValue(defaultParams, key);
  input.setAttribute('data-default', defaultValue);
  
  const defaultSpan = document.createElement('small');
  defaultSpan.className = 'form-text text-muted';
  defaultSpan.textContent = `Default: ${defaultValue}`;
  
  formGroup.appendChild(label);
  formGroup.appendChild(input);
  formGroup.appendChild(defaultSpan);
  
  return formGroup;
}
function getNestedValue(obj, path) {
    return path.split('.').reduce((prev, curr) => prev && prev[curr], obj);
  }
  function updateParams(event) {
  event.preventDefault(); // Ensure the form doesn't submit traditionally
  const formData = new FormData(document.getElementById('paramForm'));
  const updatedParams = {};

  formData.forEach((value, key) => {
    if (value === 'true') {
      value = true;
    } else if (value === 'false') {
      value = false;
    } else if (!isNaN(value) && value !== '') {
      value = Number(value);
    }
    setNestedValue(updatedParams, key, value);
  });

  console.log('Sending updated params:', updatedParams);

  fetch('/api/navigation/update', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(updatedParams)
  })
  .then(response => {
    console.log('Response status:', response.status);
    console.log('Response headers:', response.headers);
    return response.json();
  })
  .then(data => {
    console.log('Update successful:', data);
    showFeedback('Parameters updated successfully!', 'success');
    currentParams = updatedParams;
    displayParams();
  })
  .catch(error => {
    console.error('Error updating parameters:', error);
    showFeedback('Error updating parameters. Please try again.', 'danger');
  });
}

function setNestedValue(obj, path, value) {
    const keys = path.split('.');
    let current = obj;
    for (let i = 0; i < keys.length - 1; i++) {
      if (!current[keys[i]]) {
        current[keys[i]] = {};
      }
      current = current[keys[i]];
    }
    current[keys[keys.length - 1]] = value;
  }
function resetToDefaults() {
    currentParams = JSON.parse(JSON.stringify(defaultParams));
    displayParams();
    showFeedback('Parameters reset to defaults. Click "Update Parameters" to save.', 'info');
  }
function showFeedback(message, type) {
    const feedbackDiv = document.getElementById('feedback');
    feedbackDiv.className = `alert alert-${type}`;
    feedbackDiv.textContent = message;
  }
  
  document.addEventListener('DOMContentLoaded', () => {
  fetchParams();
  document.getElementById('updateButton').addEventListener('click', updateParams);
  document.getElementById('resetDefaults').addEventListener('click', resetToDefaults);
});
  </script>
